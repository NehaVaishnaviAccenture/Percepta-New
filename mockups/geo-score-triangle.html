<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEO Score — Visualization Mockups</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F3F4F6;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #0A0A0A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 48px 24px 64px;
    }

    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8E8E8E;
    }

    /* ── Shared slider card ── */
    .slider-card {
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 16px;
      padding: 24px 36px 28px;
      width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .slider-card label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8E8E8E;
      align-self: flex-start;
    }

    .slider-card input[type=range] {
      width: 100%;
      accent-color: #A100FF;
      cursor: pointer;
    }

    #sliderVal {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #A100FF;
    }

    /* ── Viz grid ── */
    .viz-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 560px));
      gap: 24px;
      width: 100%;
      max-width: 1160px;
      justify-content: center;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 16px;
      padding: 28px 32px 28px;
      min-width: 0;
    }

    .card-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8E8E8E;
      margin-bottom: 4px;
    }

    .viz-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: #EDD9FF;
      color: #6B00A8;
      border-radius: 4px;
      padding: 2px 8px;
      margin-bottom: 18px;
    }

    .score-headline {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 24px;
    }

    .score-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
    }

    .score-tier {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
    }

    /* ── Shared tier legend (used by triangle, stepped, column) ── */
    .tier-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      margin-top: 14px;
    }

    .tier-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #4A4A4A;
      cursor: default;
      transition: opacity 0.15s;
    }

    .tier-legend-item.inactive { opacity: 0.38; }

    .tier-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tier-legend-range {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #B8B8CC;
    }

    /* ── Arch ── */
    .arch-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    svg.arch {
      width: 100%;
      max-width: 340px;
      height: auto;
      display: block;
      overflow: visible;
    }

    .arch-tier-labels {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 340px;
      margin-top: 8px;
      padding: 0 4px;
    }

    .arch-tier-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      flex: 1;
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>

  <span class="page-title">GEO Score — Visualization Concepts</span>

  <!-- ── Shared slider ── -->
  <div class="slider-card">
    <label>Try a score</label>
    <input type="range" id="scoreSlider" min="0" max="100" value="51" />
    <div id="sliderVal">51</div>
  </div>

  <div class="viz-grid">

    <!-- A: TRIANGLE RAMP -->
    <div class="card">
      <div class="card-label">Overall GEO Score</div>
      <span class="viz-tag">Option A — Triangle Ramp</span>
      <div class="score-headline">
        <span class="score-number" id="triScore">51</span>
        <span class="score-tier" id="triTier">Emerging</span>
      </div>
      <svg style="width:100%;height:auto;display:block;overflow:visible;" viewBox="0 0 488 130" id="triSvg"></svg>
      <div class="tier-legend" id="triLegend"></div>
    </div>

    <!-- B: ARCH -->
    <div class="card">
      <div class="card-label">Overall GEO Score</div>
      <span class="viz-tag">Option B — Arch</span>
      <div class="score-headline">
        <span class="score-number" id="archScore">51</span>
        <span class="score-tier" id="archTier">Emerging</span>
      </div>
      <div class="arch-wrap">
        <svg class="arch" viewBox="0 0 340 200" id="archSvg"></svg>
        <div class="arch-tier-labels" id="archTierLabels"></div>
      </div>
    </div>

    <!-- C: ANGULAR STEPPED -->
    <div class="card">
      <div class="card-label">Overall GEO Score</div>
      <span class="viz-tag">Option C — Angular Stepped</span>
      <div class="score-headline">
        <span class="score-number" id="stepScore">51</span>
        <span class="score-tier" id="stepTier">Emerging</span>
      </div>
      <svg style="width:100%;height:auto;display:block;overflow:visible;" viewBox="0 0 488 110" id="stepSvg"></svg>
      <div class="tier-legend" id="stepLegend"></div>
    </div>

    <!-- D: COLUMN -->
    <div class="card">
      <div class="card-label">Overall GEO Score</div>
      <span class="viz-tag">Option D — Column</span>
      <div class="score-headline">
        <span class="score-number" id="colScore">51</span>
        <span class="score-tier" id="colTier">Emerging</span>
      </div>
      <svg style="width:100%;height:auto;display:block;overflow:visible;" viewBox="0 0 488 150" id="colSvg"></svg>
      <div class="tier-legend" id="colLegend"></div>
    </div>

    <!-- E: VERTICAL DIVIDED BAR -->
    <div class="card" style="display:flex;gap:32px;align-items:flex-start;">
      <div style="flex:1;min-width:0;">
        <div class="card-label">Overall GEO Score</div>
        <span class="viz-tag">Option E — Vertical Bar</span>
        <div class="score-headline">
          <span class="score-number" id="vbarScore">51</span>
          <span class="score-tier" id="vbarTier">Emerging</span>
        </div>
        <div class="tier-legend" id="vbarLegend"></div>
      </div>
      <svg id="vbarSvg" style="flex-shrink:0;display:block;overflow:visible;" width="80" height="320"></svg>
    </div>

  </div>

<script>
const TIERS = [
  { name: 'Fragmented',  min: 0,  max: 44,  color: '#E0003B', text: '#B7002F' },
  { name: 'Emerging',    min: 45, max: 55,  color: '#F48500', text: '#B15F00' },
  { name: 'Competitive', min: 56, max: 69,  color: '#F3B10C', text: '#996E00' },
  { name: 'Leader',      min: 70, max: 79,  color: '#2F6DFF', text: '#043BCC' },
  { name: 'Authority',   min: 80, max: 100, color: '#00AB7B', text: '#007653' },
];

const MARKER_COLOR = '#0A0A0A';

function tierForScore(s) {
  return TIERS.find(t => s >= t.min && s <= t.max) || TIERS[0];
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

// ── Shared legend renderer ─────────────────────────────────────────────────
function renderLegend(containerId, score) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  TIERS.forEach(t => {
    const active = score >= t.min && score <= t.max;
    const item = document.createElement('div');
    item.className = 'tier-legend-item' + (active ? '' : ' inactive');
    item.innerHTML = `
      <span class="tier-legend-dot" style="background:${t.color}"></span>
      <span style="color:${active ? t.text : '#4A4A4A'};font-weight:${active ? 600 : 500}">${t.name}</span>
      <span class="tier-legend-range">${t.min}–${t.max}</span>
    `;
    el.appendChild(item);
  });
}

// ══════════════════════════════════════════════════════════════════════════
// A — TRIANGLE RAMP
// ══════════════════════════════════════════════════════════════════════════
const TW = 488, TH = 130;
function scoreToX(s) { return (s / 100) * TW; }
function hypoY(x)    { return TH - (x / TW) * TH; }

function renderTriangle(score) {
  const svg = document.getElementById('triSvg');
  svg.innerHTML = '';

  TIERS.forEach(tier => {
    const x0 = scoreToX(tier.min);
    const x1 = scoreToX(Math.min(tier.max + 1, 100));
    svg.appendChild(svgEl('polygon', {
      points: `${x0},${TH} ${x1},${TH} ${x1},${hypoY(x1)} ${x0},${hypoY(x0)}`,
      fill: tier.color,
    }));
    if (tier.max < 100) {
      const xd = scoreToX(tier.max + 1);
      svg.appendChild(svgEl('line', { x1: xd, y1: TH, x2: xd, y2: hypoY(xd), stroke: '#fff', 'stroke-width': '1.5' }));
    }
  });

  const mx = scoreToX(score);
  const myTop = hypoY(mx);

  svg.appendChild(svgEl('line', { x1: mx, y1: TH, x2: mx, y2: myTop, stroke: MARKER_COLOR, 'stroke-width': '2' }));
  svg.appendChild(svgEl('circle', { cx: mx, cy: myTop, r: '5', fill: MARKER_COLOR, stroke: '#fff', 'stroke-width': '2' }));

  const lbl = svgEl('text', { x: mx, y: myTop - 10, 'text-anchor': 'middle', 'font-family': 'Space Grotesk, sans-serif', 'font-size': '13', 'font-weight': '700', fill: MARKER_COLOR });
  lbl.textContent = score;
  svg.appendChild(lbl);

  const tier = tierForScore(score);
  document.getElementById('triScore').textContent = score;
  document.getElementById('triScore').style.color = tier.color;
  document.getElementById('triTier').textContent = tier.name;
  document.getElementById('triTier').style.color = tier.color;
  renderLegend('triLegend', score);
}

// ══════════════════════════════════════════════════════════════════════════
// B — ARCH
// ══════════════════════════════════════════════════════════════════════════
const AW = 340, CX = 170, CY = 170, R_OUTER = 150, R_INNER = 104;

function scoreToAngle(s) { return Math.PI - (s / 100) * Math.PI; }
function polar(r, a) { return { x: CX + r * Math.cos(a), y: CY - r * Math.sin(a) }; }

function arcPath(a0, a1) {
  const o0 = polar(R_OUTER, a0), o1 = polar(R_OUTER, a1);
  const i1 = polar(R_INNER, a1), i0 = polar(R_INNER, a0);
  const lg = Math.abs(a1 - a0) > Math.PI ? 1 : 0;
  return `M${o0.x} ${o0.y} A${R_OUTER} ${R_OUTER} 0 ${lg} 1 ${o1.x} ${o1.y} L${i1.x} ${i1.y} A${R_INNER} ${R_INNER} 0 ${lg} 0 ${i0.x} ${i0.y}Z`;
}

function renderArch(score) {
  const svg = document.getElementById('archSvg');
  svg.innerHTML = '';

  TIERS.forEach(tier => {
    const a0 = scoreToAngle(tier.min), a1 = scoreToAngle(Math.min(tier.max + 1, 100));
    svg.appendChild(svgEl('path', { d: arcPath(a0, a1), fill: tier.color }));
    if (tier.max < 100) {
      const ad = scoreToAngle(tier.max + 1);
      const o = polar(R_OUTER + 1, ad), i = polar(R_INNER - 1, ad);
      svg.appendChild(svgEl('line', { x1: o.x, y1: o.y, x2: i.x, y2: i.y, stroke: '#fff', 'stroke-width': '2' }));
    }
  });

  const angle = scoreToAngle(score);
  const tip = polar(R_OUTER + 6, angle), base = polar(R_INNER - 12, angle);
  svg.appendChild(svgEl('line', { x1: base.x, y1: base.y, x2: tip.x, y2: tip.y, stroke: MARKER_COLOR, 'stroke-width': '2.5', 'stroke-linecap': 'round' }));

  const scoreTxt = svgEl('text', { x: CX, y: CY - 24, 'text-anchor': 'middle', 'font-family': 'Space Grotesk, sans-serif', 'font-size': '36', 'font-weight': '700', fill: tierForScore(score).color });
  scoreTxt.textContent = score;
  svg.appendChild(scoreTxt);

  const tierTxt = svgEl('text', { x: CX, y: CY - 8, 'text-anchor': 'middle', 'font-family': 'Inter, sans-serif', 'font-size': '12', 'font-weight': '600', 'letter-spacing': '0.06em', fill: '#8E8E8E' });
  tierTxt.textContent = tierForScore(score).name.toUpperCase();
  svg.appendChild(tierTxt);

  [0, 20, 40, 60, 80, 100].forEach(val => {
    const a = scoreToAngle(val);
    const tickOuter = polar(R_OUTER + 3, a);
    const tickInner = polar(R_OUTER - 1, a);
    svg.appendChild(svgEl('line', {
      x1: tickInner.x, y1: tickInner.y,
      x2: tickOuter.x, y2: tickOuter.y,
      stroke: '#fff', 'stroke-width': '1.5',
    }));
    const lp = polar(R_OUTER + 17, a);
    const anchor = val === 0 ? 'start' : val === 100 ? 'end' : 'middle';
    const t = svgEl('text', { x: lp.x, y: lp.y + 4, 'text-anchor': anchor, 'font-family': 'JetBrains Mono, monospace', 'font-size': '10', fill: '#8E8E8E' });
    t.textContent = val;
    svg.appendChild(t);
  });

  const tier = tierForScore(score);
  document.getElementById('archScore').textContent = score;
  document.getElementById('archScore').style.color = tier.color;
  document.getElementById('archTier').textContent = tier.name;
  document.getElementById('archTier').style.color = tier.color;

  const labelsEl = document.getElementById('archTierLabels');
  labelsEl.innerHTML = '';
  TIERS.forEach(t => {
    const active = score >= t.min && score <= t.max;
    const span = document.createElement('span');
    span.className = 'arch-tier-label';
    span.style.color = t.text;
    span.style.opacity = active ? '1' : '0.35';
    span.textContent = t.name;
    labelsEl.appendChild(span);
  });
}

// ══════════════════════════════════════════════════════════════════════════
// C — ANGULAR STEPPED
// ══════════════════════════════════════════════════════════════════════════
const SW = 488, SKEW = 14, BAR_H = 56, STEP_GAP = 3, BASE_Y = 90, TOP_Y = BASE_Y - BAR_H, ACTIVE_BOOST = 18;

function renderStepped(score) {
  const svg = document.getElementById('stepSvg');
  svg.innerHTML = '';
  const activeTier = tierForScore(score);

  let cursor = 0;
  const segments = TIERS.map(tier => {
    const w = ((tier.max - tier.min + 1) / 100) * SW;
    const x0 = cursor; cursor += w;
    return { ...tier, x0, x1: cursor, w };
  });

  segments.forEach(seg => {
    const active = seg.name === activeTier.name;
    const topY = TOP_Y - (active ? ACTIVE_BOOST : 0);
    const x0b = seg.x0 + STEP_GAP / 2, x1b = seg.x1 - STEP_GAP / 2;
    const x0t = x0b + SKEW, x1t = x1b + SKEW;
    svg.appendChild(svgEl('polygon', {
      points: `${x0b},${BASE_Y} ${x1b},${BASE_Y} ${x1t},${topY} ${x0t},${topY}`,
      fill: seg.color,
      opacity: active ? '1' : '0.38',
    }));
    if (active) {
      svg.appendChild(svgEl('line', { x1: x0t, y1: topY, x2: x1t, y2: topY, stroke: '#fff', 'stroke-width': '2', opacity: '0.5' }));
    }
  });

  const mx = (score / 100) * SW;
  const markerTopY = TOP_Y - ACTIVE_BOOST - 8;
  svg.appendChild(svgEl('line', { x1: mx, y1: BASE_Y + 4, x2: mx, y2: markerTopY + 2, stroke: MARKER_COLOR, 'stroke-width': '2' }));
  svg.appendChild(svgEl('line', { x1: mx - 4, y1: markerTopY, x2: mx + 4, y2: markerTopY, stroke: MARKER_COLOR, 'stroke-width': '2.5', 'stroke-linecap': 'round' }));

  const lbl = svgEl('text', { x: mx, y: markerTopY - 7, 'text-anchor': 'middle', 'font-family': 'Space Grotesk, sans-serif', 'font-size': '13', 'font-weight': '700', fill: MARKER_COLOR });
  lbl.textContent = score;
  svg.appendChild(lbl);

  document.getElementById('stepScore').textContent = score;
  document.getElementById('stepScore').style.color = activeTier.color;
  document.getElementById('stepTier').textContent = activeTier.name;
  document.getElementById('stepTier').style.color = activeTier.color;
  renderLegend('stepLegend', score);
}

// ══════════════════════════════════════════════════════════════════════════
// D — COLUMN
// ══════════════════════════════════════════════════════════════════════════
const COL_W = 488, COL_H = 140, COL_PAD = 6;

function renderColumn(score) {
  const svg = document.getElementById('colSvg');
  svg.innerHTML = '';
  const activeTier = tierForScore(score);
  const MAX_COL_H = COL_H;
  const ACTIVE_H = MAX_COL_H;
  const INACTIVE_H = MAX_COL_H * 0.52;

  let cursor = 0;
  TIERS.forEach(tier => {
    const w = ((tier.max - tier.min + 1) / 100) * COL_W;
    const active = tier.name === activeTier.name;
    const colH = active ? ACTIVE_H : INACTIVE_H;
    const x = cursor + COL_PAD / 2;
    const colW = w - COL_PAD;
    const y = COL_H - colH;

    svg.appendChild(svgEl('rect', {
      x, y,
      width: colW,
      height: colH,
      fill: tier.color,
      opacity: active ? '1' : '0.32',
      rx: '3',
    }));

    // score marker line inside active column
    if (active) {
      const mx = cursor + (score - tier.min) / (tier.max - tier.min + 1) * w + COL_PAD / 2;
      // clamp mx within column
      const clampedMx = Math.min(Math.max(mx, x + 2), x + colW - 2);
      svg.appendChild(svgEl('line', {
        x1: clampedMx, y1: y - 4,
        x2: clampedMx, y2: COL_H + 4,
        stroke: MARKER_COLOR, 'stroke-width': '2',
      }));

      const lbl = svgEl('text', {
        x: clampedMx, y: y - 10,
        'text-anchor': 'middle',
        'font-family': 'Space Grotesk, sans-serif',
        'font-size': '13',
        'font-weight': '700',
        fill: MARKER_COLOR,
      });
      lbl.textContent = score;
      svg.appendChild(lbl);
    }

    cursor += w;
  });

  // baseline
  svg.appendChild(svgEl('line', { x1: 0, y1: COL_H, x2: COL_W, y2: COL_H, stroke: '#E5E5E5', 'stroke-width': '1' }));

  document.getElementById('colScore').textContent = score;
  document.getElementById('colScore').style.color = activeTier.color;
  document.getElementById('colTier').textContent = activeTier.name;
  document.getElementById('colTier').style.color = activeTier.color;
  renderLegend('colLegend', score);
}

// ══════════════════════════════════════════════════════════════════════════
// E — VERTICAL DIVIDED BAR
// ══════════════════════════════════════════════════════════════════════════
const VBAR_W = 36, VBAR_H = 320, VBAR_X = 22;

function renderVBar(score) {
  const svg = document.getElementById('vbarSvg');
  svg.innerHTML = '';

  // Tiers stacked bottom (Fragmented) to top (Authority)
  // reversed so Authority is at top visually
  const reversed = [...TIERS].reverse();
  let cursor = 0;

  reversed.forEach(tier => {
    const segH = ((tier.max - tier.min + 1) / 100) * VBAR_H;
    const y = cursor;
    const active = score >= tier.min && score <= tier.max;

    svg.appendChild(svgEl('rect', {
      x: VBAR_X, y,
      width: VBAR_W, height: segH,
      fill: tier.color,
      opacity: active ? '1' : '0.28',
    }));

    // divider
    if (cursor > 0) {
      svg.appendChild(svgEl('line', {
        x1: VBAR_X, y1: y, x2: VBAR_X + VBAR_W, y2: y,
        stroke: '#fff', 'stroke-width': '1.5',
      }));
    }

    cursor += segH;
  });

  // Score marker — horizontal line at score position
  // score 100 = top (y=0), score 0 = bottom (y=VBAR_H)
  const markerY = VBAR_H - (score / 100) * VBAR_H;

  svg.appendChild(svgEl('line', {
    x1: VBAR_X - 10, y1: markerY,
    x2: VBAR_X + VBAR_W + 10, y2: markerY,
    stroke: MARKER_COLOR, 'stroke-width': '2.5',
    'stroke-linecap': 'round',
  }));

  // score label to the right
  const lbl = svgEl('text', {
    x: VBAR_X + VBAR_W + 14,
    y: markerY + 5,
    'font-family': 'Space Grotesk, sans-serif',
    'font-size': '14',
    'font-weight': '700',
    fill: MARKER_COLOR,
  });
  lbl.textContent = score;
  svg.appendChild(lbl);

  // 0 and 100 axis labels
  [{ label: '100', y: 6 }, { label: '0', y: VBAR_H - 2 }].forEach(({ label, y }) => {
    const t = svgEl('text', {
      x: VBAR_X - 4, y,
      'text-anchor': 'end',
      'font-family': 'JetBrains Mono, monospace',
      'font-size': '10',
      fill: '#B8B8CC',
    });
    t.textContent = label;
    svg.appendChild(t);
  });

  const tier = tierForScore(score);
  document.getElementById('vbarScore').textContent = score;
  document.getElementById('vbarScore').style.color = tier.color;
  document.getElementById('vbarTier').textContent = tier.name;
  document.getElementById('vbarTier').style.color = tier.color;
  renderLegend('vbarLegend', score);
}

// ── Shared slider ──────────────────────────────────────────────────────────
function renderAll(score) {
  renderTriangle(score);
  renderArch(score);
  renderStepped(score);
  renderColumn(score);
  renderVBar(score);
  const tier = tierForScore(score);
  document.getElementById('sliderVal').textContent = score;
  document.getElementById('sliderVal').style.color = tier.color;
}

document.getElementById('scoreSlider').addEventListener('input', e => renderAll(parseInt(e.target.value)));
renderAll(51);
</script>
</body>
